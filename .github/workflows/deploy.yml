name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  deploy_backend_render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render backend deploy hook if configured
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Triggering Render backend deploy hook..."
            curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
          else
            echo "RENDER_DEPLOY_HOOK_URL is not set. Skipping backend deploy."
          fi

  deploy_frontend_vercel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy frontend to Vercel if configured
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel secrets detected. Deploying frontend..."
            npm install -g vercel
            cd frontend
            vercel deploy --prod --yes --token "$VERCEL_TOKEN"
          else
            echo "VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is missing. Skipping frontend deploy."
          fi